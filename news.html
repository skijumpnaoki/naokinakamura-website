<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>News — Naoki Nakamura</title>
<meta name="description" content="News and journal from Naoki Nakamura, Japanese professional ski jumper.">
<meta property="og:title" content="News — Naoki Nakamura">
<meta property="og:type" content="article">
<meta property="og:image" content="/images/hero_action.jpg">
<meta name="twitter:card" content="summary_large_image">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<!-- Preferred sanitizer (pinned). If it fails to load, a built-in allow-list sanitizer is used. -->
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.7/dist/purify.min.js" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --black: #050608; --white: #f0ede8; --ice: #a8cfe0; --dim: #8a8a8a;
    --line: rgba(255,255,255,0.08);
  }
  html { scroll-behavior: smooth; }
  body {
    background: var(--black); color: var(--white);
    font-family: 'DM Sans', sans-serif; font-weight: 300;
    -webkit-font-smoothing: antialiased; line-height: 1.6;
  }
  a { color: var(--ice); }

  /* top bar */
  .topbar {
    position: sticky; top: 0; z-index: 50;
    display: flex; justify-content: space-between; align-items: center;
    padding: 22px 32px; border-bottom: 1px solid var(--line);
    background: rgba(5,6,8,0.86); backdrop-filter: blur(8px);
  }
  .topbar .logo {
    font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; letter-spacing: 0.12em;
    color: var(--white); text-decoration: none; opacity: 0.9;
  }
  .topbar .back {
    font-size: 0.72rem; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--dim); text-decoration: none; transition: color 0.3s;
  }
  .topbar .back:hover { color: var(--white); }

  main { max-width: 680px; margin: 0 auto; padding: 64px 24px 120px; min-height: 60vh; }

  /* states */
  .state { text-align: center; padding: 80px 16px; color: var(--dim); }
  .state h1 {
    font-family: 'Bebas Neue', sans-serif; font-size: 2.4rem; letter-spacing: 0.06em;
    color: var(--white); margin-bottom: 14px; font-weight: 400;
  }
  .state p { font-size: 0.9rem; margin-bottom: 28px; }
  .btn {
    display: inline-block; font-size: 0.72rem; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--black); background: var(--ice); text-decoration: none;
    padding: 13px 26px; border: none; cursor: pointer; transition: opacity 0.3s;
  }
  .btn:hover { opacity: 0.85; }
  .btn-ghost { color: var(--ice); background: transparent; border: 1px solid rgba(168,207,224,0.4); margin-left: 10px; }

  /* article header */
  .a-cat {
    display: inline-block; font-size: 0.6rem; letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--ice); border: 1px solid rgba(168,207,224,0.3); padding: 4px 11px; margin-bottom: 22px;
  }
  .a-title {
    font-family: 'Cormorant Garamond', serif; font-weight: 500; line-height: 1.18;
    font-size: clamp(2rem, 5vw, 3.1rem); color: var(--white); margin-bottom: 18px;
  }
  .a-meta { font-size: 0.72rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--dim); margin-bottom: 8px; }
  .a-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 30px; }
  .a-tag { font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--dim); border: 1px solid var(--line); padding: 3px 9px; }
  .a-langnote {
    font-size: 0.78rem; color: var(--dim); border: 1px solid var(--line);
    border-left: 2px solid var(--ice); padding: 10px 14px; margin: 0 0 30px;
  }
  .a-hero { width: 100%; margin: 8px 0 36px; }
  .a-hero img { width: 100%; height: auto; display: block; }
  .a-excerpt { font-size: 1.05rem; color: #cfcdc8; margin-bottom: 30px; font-style: italic; }

  /* article body (raw body_html lives here) */
  .a-body { font-size: 1.02rem; line-height: 1.85; color: #d8d6d1; }
  .a-body > * + * { margin-top: 1.25em; }
  .a-body p { line-height: 1.85; }
  .a-body a { color: var(--ice); text-decoration: underline; text-underline-offset: 3px; }
  .a-body h1, .a-body h2, .a-body h3 {
    font-family: 'Cormorant Garamond', serif; color: var(--white); font-weight: 500;
    line-height: 1.3; margin-top: 1.6em;
  }
  .a-body h1 { font-size: 1.9rem; } .a-body h2 { font-size: 1.55rem; } .a-body h3 { font-size: 1.25rem; }
  .a-body img { max-width: 100%; height: auto; display: block; }
  .a-body figure { margin: 1.6em 0; }
  .a-body figure img { width: 100%; }
  .a-body figcaption { font-size: 0.78rem; color: var(--dim); text-align: center; margin-top: 8px; }
  .a-body ul, .a-body ol { padding-left: 1.4em; }
  .a-body li { margin: 0.4em 0; }
  .a-body blockquote {
    border-left: 2px solid var(--ice); padding-left: 18px; color: #cfcdc8; font-style: italic;
  }
  .a-body strong { color: var(--white); font-weight: 500; }

  /* YouTube thumbnail embeds: <figure class="yt-embed"><a><img></a></figure> */
  .a-body .yt-embed { position: relative; }
  .a-body .yt-embed a { display: block; position: relative; }
  .a-body .yt-embed img { width: 100%; display: block; }
  .a-body .yt-embed a::after {
    content: ''; position: absolute; inset: 0; margin: auto;
    width: 0; height: 0; border-style: solid;
    border-width: 18px 0 18px 30px; border-color: transparent transparent transparent rgba(255,255,255,0.92);
    filter: drop-shadow(0 2px 6px rgba(0,0,0,0.5)); transition: transform 0.25s;
  }
  .a-body .yt-embed a::before {
    content: ''; position: absolute; inset: 0; margin: auto;
    width: 72px; height: 72px; border-radius: 50%;
    background: rgba(5,6,8,0.55); border: 2px solid rgba(255,255,255,0.85); transition: background 0.25s;
  }
  .a-body .yt-embed a:hover::before { background: rgba(168,207,224,0.85); }

  footer { border-top: 1px solid var(--line); padding: 32px; text-align: center; }
  footer a { font-size: 0.72rem; letter-spacing: 0.16em; text-transform: uppercase; color: var(--dim); text-decoration: none; }
  footer a:hover { color: var(--ice); }
</style>
</head>
<body>
  <div class="topbar">
    <a href="/" class="logo">NN</a>
    <a href="/#news" class="back">← News</a>
  </div>

  <main id="main">
    <div class="state" id="loading"><p>Loading…</p></div>
    <article id="article" hidden></article>
  </main>

  <footer><a href="/#news">← Back to all news</a></footer>

<script>
  // ---- i18n for the viewer chrome ----
  const STR = {
    en: { loading: 'Loading…', nfTitle: 'Article not found', nfBody: 'This article may have been moved or is no longer available.',
          errTitle: 'Couldn’t load this article', errBody: 'Something went wrong. Please try again.',
          retry: 'Retry', home: 'Back to news', viewSource: 'View full result ↗', loadingDate: '' },
    ja: { loading: '読み込み中…', nfTitle: '記事が見つかりません', nfBody: 'この記事は移動されたか、現在公開されていません。',
          errTitle: '記事を読み込めませんでした', errBody: '問題が発生しました。もう一度お試しください。',
          retry: '再試行', home: 'ニュースへ', viewSource: '詳細を見る ↗' },
  };

  function siteLang() {
    return String(document.documentElement.lang || 'en').toLowerCase().startsWith('ja') ? 'ja' : 'en';
  }
  function t(key) { const l = siteLang(); return (STR[l] && STR[l][key]) || STR.en[key]; }

  // id from /news/<id> (rewrite) or ?id=<id>
  function getId() {
    const fromQuery = new URLSearchParams(location.search).get('id');
    if (fromQuery) return fromQuery.trim();
    const m = location.pathname.match(/\/news\/([^\/?#]+)/);
    return m ? decodeURIComponent(m[1]).trim() : '';
  }

  function escapeHtml(v) {
    return String(v == null ? '' : v)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }
  function safeImageUrl(url) {
    if (typeof url !== 'string' || !/^https?:\/\//i.test(url)) return null;
    if (/["'<>\\]/.test(url)) return null;
    return url;
  }
  function formatDate(dateStr, lang) {
    if (!dateStr) return '';
    const d = new Date(dateStr);
    if (isNaN(d.getTime())) return '';
    return d.toLocaleDateString(lang === 'ja' ? 'ja-JP' : 'en-US', { year: 'numeric', month: 'long', day: 'numeric' });
  }
  function prettyTag(slug) { return String(slug).replace(/-/g, ' '); }

  // ---- sanitization: DOMPurify if present, else a strict built-in allow-list ----
  const ALLOWED_TAGS = ['p','a','br','figure','figcaption','img','h1','h2','h3','ul','ol','li','blockquote','strong','em'];
  const ALLOWED_ATTR = ['href','target','rel','src','alt','loading','style','class'];

  function builtinSanitize(html) {
    const allowTags = new Set(ALLOWED_TAGS.map(s => s.toUpperCase()));
    const allowAttr = new Set(ALLOWED_ATTR);
    const doc = new DOMParser().parseFromString(html, 'text/html'); // inert: scripts/img don't run/load
    (function walk(node) {
      [...node.childNodes].forEach(child => {
        if (child.nodeType === 8) { child.remove(); return; }        // comments
        if (child.nodeType !== 1) return;                            // keep text
        if (!allowTags.has(child.tagName)) { child.replaceWith(...child.childNodes); return; } // unwrap unknown tag
        [...child.attributes].forEach(a => {
          const name = a.name.toLowerCase();
          if (name.startsWith('on') || !allowAttr.has(name)) { child.removeAttribute(a.name); return; }
          if (name === 'href' || name === 'src') {
            if (!/^(https?:|mailto:|\/|#)/i.test(a.value.trim())) child.removeAttribute(a.name);
          }
        });
        if (child.tagName === 'A') { child.setAttribute('target', '_blank'); child.setAttribute('rel', 'noopener noreferrer'); }
        walk(child);
      });
    })(doc.body);
    return doc.body.innerHTML;
  }

  let dpHooked = false;
  function sanitizeHtml(html) {
    if (typeof html !== 'string' || !html) return '';
    if (window.DOMPurify && typeof window.DOMPurify.sanitize === 'function') {
      if (!dpHooked) {
        window.DOMPurify.addHook('afterSanitizeAttributes', node => {
          if (node.tagName === 'A') { node.setAttribute('target', '_blank'); node.setAttribute('rel', 'noopener noreferrer'); }
        });
        dpHooked = true;
      }
      return window.DOMPurify.sanitize(html, { ALLOWED_TAGS, ALLOWED_ATTR, ALLOW_DATA_ATTR: false });
    }
    return builtinSanitize(html);
  }

  // ---- rendering ----
  function showState(html) {
    const a = document.getElementById('article');
    a.hidden = true; a.innerHTML = '';
    const l = document.getElementById('loading');
    l.hidden = false; l.innerHTML = html;
  }
  function showNotFound() {
    showState(`<h1>${escapeHtml(t('nfTitle'))}</h1><p>${escapeHtml(t('nfBody'))}</p><a class="btn" href="/#news">${escapeHtml(t('home'))}</a>`);
  }
  function showError() {
    showState(`<h1>${escapeHtml(t('errTitle'))}</h1><p>${escapeHtml(t('errBody'))}</p>`
      + `<button class="btn" onclick="location.reload()">${escapeHtml(t('retry'))}</button>`
      + `<a class="btn btn-ghost" href="/#news">${escapeHtml(t('home'))}</a>`);
  }

  function renderPost(post, lang) {
    const article = document.getElementById('article');
    const loading = document.getElementById('loading');
    const date = formatDate(post.date, lang);
    const hero = safeImageUrl(post.image);
    const cat = (post.type === 'article') ? (lang === 'ja' ? 'ジャーナル' : 'Journal')
              : (post.type === 'result') ? (lang === 'ja' ? '結果' : 'Result')
              : (post.type === 'report') ? (lang === 'ja' ? 'レポート' : 'Report')
              : (lang === 'ja' ? '更新' : 'Update');

    let html = '';
    html += `<div class="a-cat">${escapeHtml(cat)}</div>`;
    html += `<h1 class="a-title">${escapeHtml(post.title || '')}</h1>`;
    if (date) html += `<div class="a-meta">${escapeHtml(date)}</div>`;
    if (Array.isArray(post.tags) && post.tags.length) {
      html += `<div class="a-tags">${post.tags.map(tg => `<span class="a-tag">${escapeHtml(prettyTag(tg))}</span>`).join('')}</div>`;
    }
    // en site + ja-only article (no English translation yet) → tell the reader
    if (lang === 'en' && post.lang === 'ja') {
      html += `<div class="a-langnote">This entry is shown in Japanese — an English translation isn’t available yet.</div>`;
    }
    if (hero) html += `<div class="a-hero"><img src="${escapeHtml(hero)}" alt="${escapeHtml(post.title || '')}" loading="lazy"></div>`;

    if (post.type === 'article' && post.body_html) {
      // raw, server-sanitized HTML — sanitized again here before injection
      html += `<div class="a-body">${sanitizeHtml(post.body_html)}</div>`;
    } else {
      // result / report / unknown — no body. Show excerpt + a link out to the source.
      if (post.excerpt) html += `<p class="a-excerpt">${escapeHtml(post.excerpt)}</p>`;
      const src = (typeof post.url === 'string' && /^https?:\/\//i.test(post.url)) ? post.url : null;
      if (src) html += `<p><a class="btn" href="${escapeHtml(src)}" target="_blank" rel="noopener">${escapeHtml(t('viewSource'))}</a></p>`;
    }

    article.innerHTML = html;
    article.hidden = false;
    loading.hidden = true;
    document.title = (post.title ? post.title + ' — ' : '') + 'Naoki Nakamura';
    const og = document.querySelector('meta[property="og:title"]');
    if (og && post.title) og.setAttribute('content', post.title);
    if (hero) { const ogi = document.querySelector('meta[property="og:image"]'); if (ogi) ogi.setAttribute('content', hero); }
    return article;
  }

  async function load() {
    const lang = siteLang();
    const id = getId();
    if (!id) { showNotFound(); return; }
    showState(`<p>${escapeHtml(t('loading'))}</p>`);
    try {
      const res = await fetch(`/api/post?id=${encodeURIComponent(id)}&lang=${lang}`, { headers: { Accept: 'application/json' } });
      if (res.status === 404) { showNotFound(); return; }
      if (!res.ok) { showError(); return; }
      const post = await res.json();
      if (!post || !post.id) { showNotFound(); return; }
      renderPost(post, lang);
    } catch (e) {
      showError();
    }
  }

  // expose for diagnostics / tests
  window.__viewer = { renderPost, sanitizeHtml, builtinSanitize, getId, load };
  load();
</script>
</body>
</html>
